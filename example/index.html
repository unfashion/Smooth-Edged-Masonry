    <div class="modal">
        <div class="modal__close" id="close">
            <a class="icon">

                    <path

    <script type="module">
        import Masonry_x from './classes/Masonry_x.min.js';
        import Masonry_y from './classes/Masonry_y.min.js';
        import Lightbox from './classes/Lightbox.js';

        new Masonry_x({
            mainContainer: '.unf-masonry_x',
            itemContainer: '.picture',
            breakPoints: [0, 400, 700],
            lineHeights: [100, 150, 200],
            gaps: ['1px', '2px', '3px'],
            zoom: '2s',
        });

        new Masonry_y({
            mainContainer: '.unf-masonry_y',
            itemContainer: '.picture',
            breakPoints: [0, 400, 700],
            columns: [2, 3, 4],
            gaps: ['1px', '2px', '3px'],
            zoom: '2s',
        });
        new Lightbox();

    </script>
